<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg: #010204;
            --accent: #00f2fe;
            --pink: #ff007f;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: 'Outfit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .scene {
            width: 320px;
            height: 450px;
            perspective: 2000px;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            cursor: pointer;
        }

        /* কার্ড ক্লিক করলে ঘুরে যাবে */
        .card.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden; /* পেছনের দিক লুকানোর জন্য */
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            padding: 40px;
            box-sizing: border-box;
        }

        /* সামনের অংশ (Front) */
        .card-front {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            justify-content: flex-end;
        }

        /* পেছনের অংশ (Back) */
        .card-back {
            background: rgba(0, 242, 254, 0.05);
            backdrop-filter: blur(30px);
            transform: rotateY(180deg);
            border-color: var(--accent);
            justify-content: center;
        }

        /* ডিজাইন এলিমেন্টস */
        .chip {
            width: 50px;
            height: 40px;
            background: linear-gradient(135deg, #ffd700, #b8860b);
            border-radius: 8px;
            margin-bottom: auto;
        }

        .price {
            font-size: 32px;
            font-weight: bold;
            color: var(--accent);
            margin: 10px 0;
        }

        .input-group {
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            color: white;
            outline: none;
        }

        .btn-pay {
            background: var(--accent);
            color: black;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 242, 254, 0.3);
        }

        .btn-pay:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(0, 242, 254, 0.5);
        }

        .label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.5;
            margin-bottom: 5px;
        }

    </style>
</head>
<body>

    <div class="scene">
        <div class="card" id="mainCard">
            <div class="card-face card-front">
                <div class="chip"></div>
                <div class="label">Enterprise Plan</div>
                <div class="price">$49.00/mo</div>
                <p style="font-size: 12px; opacity: 0.7;">Click to reveal payment secure portal</p>
            </div>

            <div class="card-face card-back">
                <h3 style="margin-top: 0;">Secure Checkout</h3>
                <div class="input-group">
                    <div class="label">Card Number</div>
                    <input type="text" placeholder="**** **** **** 8829">
                </div>
                <div class="input-group">
                    <div class="label">Holder Name</div>
                    <input type="text" placeholder="SYSTEM ARCHITECT">
                </div>
                <button class="btn-pay">Authorize Payment</button>
            </div>
        </div>
    </div>

    <script>
        const card = document.getElementById('mainCard');
        
        card.addEventListener('click', () => {
            card.classList.toggle('is-flipped');
        });

        // কার্ডের ভেতরে ক্লিক করলে যাতে ফ্লিপ না হয় (শুধু বাটনের জন্য)
        const inputs = document.querySelectorAll('input, button');
        inputs.forEach(el => {
            el.addEventListener('click', (e) => e.stopPropagation());
        });
    </script>
</body>
</html>
